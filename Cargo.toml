[[bin]]
name = "wannacry_crypto_sim"
path = "src/bin/wannacry_crypto_sim.rs"

[[bin]]
name = "notpetya_locker_sim"
path = "src/bin/notpetya_locker_sim.rs"

[[bin]]
name = "darkside_doxware_sim"
path = "src/bin/darkside_doxware_sim.rs"

[[bin]]
name = "lockbit_double_ext_sim"
path = "src/bin/lockbit_double_ext_sim.rs"

[[bin]]
name = "revil_raas_sim"
path = "src/bin/revil_raas_sim.rs"

[[bin]]
name = "smoke_scan_cli"
path = "src/bin/smoke_scan_cli.rs"

[dev-dependencies]
tokio-test = "0.4"
temp-env = "0.3"
tempfile = "3.8"
tracing-test = "0.2"
tempdir = "0.3"
regex = "1.10"
hex = "0.4"
env_logger = "0.10"
criterion = { version = "0.5", features = ["html_reports", "async_tokio"] }
futures = "0.3"
serial_test = "3.0"

# Enable required features for tests and benchmarks
[package.metadata.cargo-all-features]
skip_optional_dependencies = true

# Test configuration - enable testing and telemetry features for tests
[lib]
test = true
bench = true
required-features = ["testing", "telemetry", "behavioral-analysis", "yara"]

# Enable required features for all test files
[[test]]
name = "startup_smoke_tests"
path = "tests/startup_smoke_tests.rs"
required-features = ["testing", "telemetry", "behavioral-analysis", "yara"]

[[test]]
name = "acceptance_tests"
path = "tests/acceptance_tests.rs"
required-features = ["testing", "telemetry", "behavioral-analysis", "yara"]

[[test]]
name = "false_positive"
path = "tests/false_positive.rs"
required-features = ["testing", "telemetry", "behavioral-analysis", "yara"]

[[test]]
name = "enterprise_validation"
path = "tests/enterprise_validation.rs"
required-features = ["testing", "telemetry", "behavioral-analysis", "yara"]

[[test]]
name = "integration_tests"
path = "tests/integration_tests.rs"
required-features = ["comprehensive-testing", "behavioral-analysis", "network-monitoring", "api-hooking", "yara", "advanced-detection"]

[[test]]
name = "performance_gates_tests"
path = "tests/performance_gates_tests.rs"
required-features = ["testing", "telemetry", "behavioral-analysis", "yara", "metrics"]

# Isolation engine tests - run single-threaded to prevent hangs
[[test]]
name = "isolation_engine_tests"
path = "tests/isolation_engine_tests.rs"
required-features = ["testing", "instrumentation", "validation-framework"]

[[bench]]
name = "ipc_benchmarks"
harness = false
required-features = ["testing", "telemetry", "behavioral-analysis", "yara"]

[profile.release]
lto = false
codegen-units = 16
panic = "abort"
incremental = false
debug = false
opt-level = 2
